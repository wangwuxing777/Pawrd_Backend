<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetWell RAG Test</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px 32px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      margin-bottom: 16px;
    }
    h1, h2 {
      margin: 0 0 12px;
    }
    p {
      margin: 8px 0 0;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    input, select, textarea, button {
      font: inherit;
    }
    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    button.secondary {
      background: #475569;
    }
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .grow {
      flex: 1 1 240px;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
    }
    .chat-log {
      display: grid;
      gap: 12px;
    }
    .bubble {
      border-radius: 12px;
      padding: 12px 14px;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .user {
      background: #dbeafe;
    }
    .assistant {
      background: #ecfccb;
    }
    .meta {
      font-size: 13px;
      color: #475569;
      margin-top: 8px;
    }
    .status {
      min-height: 20px;
      color: #0f766e;
      font-size: 14px;
    }
    .error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>PetWell RAG Test</h1>
      <p>Use this page to talk to the local insurance RAG backend from your browser.</p>
    </div>

    <div class="card">
      <h2>Session</h2>
      <div class="row">
        <div class="grow">
          <label for="sessionId">Session ID</label>
          <input id="sessionId" class="mono" placeholder="Create a session or paste one here" />
        </div>
        <div>
          <button id="createSessionBtn">Create Session</button>
        </div>
      </div>
      <div class="row" style="margin-top: 12px;">
        <div class="grow">
          <label for="providerSelect">Provider</label>
          <select id="providerSelect">
            <option value="">All Providers</option>
          </select>
        </div>
        <div>
          <button id="applyProviderBtn" class="secondary">Apply Provider</button>
        </div>
      </div>
      <div id="status" class="status" style="margin-top: 12px;"></div>
    </div>

    <div class="card">
      <h2>Ask</h2>
      <label for="queryInput">Insurance question</label>
      <textarea id="queryInput" placeholder="e.g. Does Blue Cross cover vet consultation for illness?"></textarea>
      <div class="row" style="margin-top: 12px;">
        <button id="askBtn">Send</button>
        <button id="clearBtn" class="secondary">Clear Chat</button>
      </div>
    </div>

    <div class="card">
      <h2>Chat Log</h2>
      <div id="chatLog" class="chat-log"></div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.protocol === "file:" ? "http://localhost:8000" : window.location.origin;
    const sessionIdInput = document.getElementById("sessionId");
    const providerSelect = document.getElementById("providerSelect");
    const queryInput = document.getElementById("queryInput");
    const statusEl = document.getElementById("status");
    const chatLog = document.getElementById("chatLog");
    const createSessionBtn = document.getElementById("createSessionBtn");
    const applyProviderBtn = document.getElementById("applyProviderBtn");
    const askBtn = document.getElementById("askBtn");
    const clearBtn = document.getElementById("clearBtn");

    function setStatus(message, isError = false) {
      statusEl.textContent = message || "";
      statusEl.classList.toggle("error", Boolean(isError));
    }

    function appendBubble(role, text, meta = "") {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;
      bubble.textContent = text;

      const wrapper = document.createElement("div");
      wrapper.appendChild(bubble);

      if (meta) {
        const metaEl = document.createElement("div");
        metaEl.className = "meta";
        metaEl.textContent = meta;
        wrapper.appendChild(metaEl);
      }

      chatLog.appendChild(wrapper);
      wrapper.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    async function fetchJSON(url, options = {}) {
      const resp = await fetch(url, options);
      const text = await resp.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = text;
      }
      if (!resp.ok) {
        throw new Error(typeof data === "string" ? data : JSON.stringify(data));
      }
      return data;
    }

    async function loadProviders() {
      const data = await fetchJSON(`${API_BASE}/api/chat/providers`);
      providerSelect.innerHTML = '<option value="">All Providers</option>';
      for (const provider of data.providers || []) {
        const option = document.createElement("option");
        option.value = provider.id;
        option.textContent = provider.has_data ? provider.name : `${provider.name} (no data)`;
        providerSelect.appendChild(option);
      }
    }

    async function createSession() {
      setStatus("Creating session...");
      const data = await fetchJSON(`${API_BASE}/api/chat/session`, { method: "POST" });
      sessionIdInput.value = data.session_id || "";
      setStatus(`Session ready: ${data.session_id}`);
      return data.session_id;
    }

    async function applyProvider() {
      const sessionId = sessionIdInput.value.trim() || await createSession();
      const provider = providerSelect.value;
      setStatus("Applying provider filter...");
      await fetchJSON(`${API_BASE}/api/chat/session/${sessionId}/provider`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ provider })
      });
      setStatus(provider ? `Provider locked to ${provider}` : "Provider reset to all providers");
    }

    async function askQuestion() {
      const query = queryInput.value.trim();
      if (!query) {
        setStatus("Please enter a question first.", true);
        return;
      }
      askBtn.disabled = true;
      try {
        const sessionId = sessionIdInput.value.trim() || await createSession();
        appendBubble("user", query);
        setStatus("Waiting for RAG answer...");

        const data = await fetchJSON(`${API_BASE}/api/chat/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: sessionId,
            query
          })
        });

        const meta = [
          data.active_provider ? `provider=${data.active_provider}` : "provider=all",
          Array.isArray(data.sources) && data.sources.length ? `sources=${data.sources.join(", ")}` : "sources=none"
        ].join(" | ");

        appendBubble("assistant", data.answer || "(empty answer)", meta);
        setStatus("Answer received.");
        queryInput.value = "";
      } catch (error) {
        setStatus(error.message || "Request failed", true);
      } finally {
        askBtn.disabled = false;
      }
    }

    createSessionBtn.addEventListener("click", async () => {
      try {
        await createSession();
      } catch (error) {
        setStatus(error.message || "Failed to create session", true);
      }
    });

    applyProviderBtn.addEventListener("click", async () => {
      try {
        await applyProvider();
      } catch (error) {
        setStatus(error.message || "Failed to apply provider", true);
      }
    });

    askBtn.addEventListener("click", askQuestion);
    clearBtn.addEventListener("click", () => {
      chatLog.innerHTML = "";
      setStatus("Chat log cleared.");
    });
    queryInput.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        askQuestion();
      }
    });

    loadProviders().catch((error) => {
      setStatus(error.message || "Failed to load providers", true);
    });
  </script>
</body>
</html>
